on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build project
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          path: build/libs/betterbeaconbeam*.jar